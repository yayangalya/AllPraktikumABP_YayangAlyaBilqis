<!DOCTYPE html>
<html>
<head>
    <title>Efek Hide Show</title>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script>
    $(document).ready(function(){

        $("#hide").click(function(){
            $("p").hide();
        });

        $("#show").click(function(){
            $("p").show();
        });

    });
    </script>
</head>

<body>
    <h2>Contoh Efek Hide / Show</h2>

    <p>Ini adalah contoh paragraf jQuery.</p>

    <button id="hide">Hide</button>
    <button id="show">Show</button>
</body>
</html>
